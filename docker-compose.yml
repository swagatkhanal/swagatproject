
services:
  mongo:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: backend_api
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017/app
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: frontend_web
    ports:
      - "80:80"
    depends_on:
      - backend
